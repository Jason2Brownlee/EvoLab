<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvoLab — Evolutionary Creature Sandbox</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --panel-border: #1e1e2e;
    --text: #c8c8d4;
    --text-dim: #6a6a7a;
    --accent: #00e4a0;
    --accent-dim: #00e4a020;
    --accent2: #ff6b4a;
    --accent3: #5b8aff;
    --node-bg: #1a1a28;
    --node-border: #2a2a3e;
    --node-hover: #222238;
    --danger: #ff4466;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'IBM Plex Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    width: 100%; height: 100%;
  }

  /* ---- Simulation Canvas ---- */
  #sim-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #sim-canvas {
    width: 100%; height: 100%;
    display: block;
    background: var(--bg);
  }

  /* ---- HUD Overlay ---- */
  #hud {
    position: absolute;
    top: 12px; left: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
    z-index: 10;
  }

  .hud-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .hud-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }

  .hud-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  .hud-value.best {
    color: var(--accent2);
  }

  /* ---- Controls Bar ---- */
  #controls-bar {
    position: absolute;
    bottom: 12px; left: 12px;
    display: flex;
    gap: 6px;
    z-index: 10;
  }

  .ctrl-btn {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .ctrl-btn:hover {
    background: var(--node-hover);
    border-color: var(--accent);
    color: var(--accent);
  }

  .ctrl-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .ctrl-btn.danger:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* ---- Fitness Graph ---- */
  #graph-container {
    position: absolute;
    bottom: 12px; right: 322px;
    width: 260px; height: 100px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    z-index: 10;
    padding: 4px;
  }

  #graph-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    padding: 2px 4px;
  }

  #fitness-graph {
    width: 100%; height: calc(100% - 16px);
    display: block;
  }

  /* ---- Pipeline Panel ---- */
  #pipeline-panel {
    width: 310px;
    background: var(--panel);
    border-left: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  #pipeline-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--panel-border);
  }

  #pipeline-header h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    font-weight: 600;
  }

  #pipeline-nodes {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #pipeline-nodes::-webkit-scrollbar { width: 4px; }
  #pipeline-nodes::-webkit-scrollbar-track { background: transparent; }
  #pipeline-nodes::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

  .pipe-node {
    background: var(--node-bg);
    border: 1px solid var(--node-border);
    padding: 10px 12px;
    cursor: grab;
    transition: all 0.15s;
    position: relative;
  }

  .pipe-node:hover {
    background: var(--node-hover);
    border-color: var(--accent);
  }

  .pipe-node.dragging {
    opacity: 0.5;
  }

  .pipe-node-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .pipe-node-type {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .pipe-node-type.evaluate { color: var(--accent3); }
  .pipe-node-type.select { color: var(--accent); }
  .pipe-node-type.crossover { color: #d4a0ff; }
  .pipe-node-type.mutate { color: var(--accent2); }
  .pipe-node-type.elitism { color: #ffd460; }

  .pipe-node-remove {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    opacity: 0;
    transition: all 0.15s;
  }

  .pipe-node:hover .pipe-node-remove { opacity: 1; }
  .pipe-node-remove:hover { color: var(--danger); }

  .pipe-node-config {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .config-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .config-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .config-input {
    background: var(--bg);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 3px 6px;
    width: 70px;
    text-align: right;
    outline: none;
    transition: border-color 0.15s;
  }

  .config-input:focus {
    border-color: var(--accent);
  }

  .config-select {
    background: var(--bg);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 3px 6px;
    outline: none;
    cursor: pointer;
  }

  .config-select:focus {
    border-color: var(--accent);
  }

  .config-checkbox {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* Connector arrows between nodes */
  .pipe-connector {
    display: flex;
    justify-content: center;
    height: 16px;
    color: var(--panel-border);
    font-size: 10px;
    line-height: 16px;
  }

  /* ---- Creature config ---- */
  #creature-config {
    padding: 10px 12px;
    border-bottom: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #creature-config label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }

  #creature-config .config-select {
    width: 100%;
    padding: 5px 8px;
  }

  #pipeline-label {
    padding: 10px 12px 4px;
  }

  #pipeline-label label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }

  #body-preview {
    background: var(--bg);
    border: 1px solid var(--panel-border);
    flex-shrink: 0;
    border-radius: 2px;
  }

  .body-desc-text {
    font-size: 10px;
    line-height: 1.5;
    color: #8888a0;
    padding: 2px 0 4px;
  }

  /* ---- Speed control ---- */
  #speed-bar {
    position: absolute;
    top: 12px; right: 322px;
    display: flex;
    gap: 4px;
    z-index: 10;
  }

  .speed-btn {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .speed-btn:hover, .speed-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ---- Info button ---- */
  .pipe-node-info {
    width: 16px; height: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    border: 1px solid var(--panel-border);
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .pipe-node-info:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  /* ---- Info tooltip ---- */
  .info-tooltip {
    position: absolute;
    z-index: 100;
    background: #1a1a2a;
    border: 1px solid var(--accent);
    padding: 12px 14px;
    font-size: 11px;
    line-height: 1.55;
    color: var(--text);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    animation: tooltipIn 0.12s ease-out;
  }

  @keyframes tooltipIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .info-tooltip-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .info-tooltip-desc {
    color: var(--text);
    margin-bottom: 8px;
  }

  .info-tooltip-params {
    border-top: 1px solid var(--panel-border);
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .info-tooltip-param {
    font-size: 10px;
    color: #9a9ab0;
    line-height: 1.5;
  }

  .info-tooltip-param-name {
    color: #c0c0d8;
    font-weight: 600;
  }

  .info-tooltip-hint {
    margin-top: 8px;
    font-size: 9px;
    color: var(--text-dim);
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>
<div id="app">
  <div id="sim-panel">
    <canvas id="sim-canvas"></canvas>

    <div id="hud">
      <div class="hud-row">
        <span class="hud-label">Gen</span>
        <span class="hud-value" id="hud-gen">0</span>
        <span class="hud-label" style="margin-left:8px">Pop</span>
        <span class="hud-value" id="hud-pop">0</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">Best (gen)</span>
        <span class="hud-value" id="hud-best-gen">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">Best (all)</span>
        <span class="hud-value best" id="hud-best-all">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">Alive</span>
        <span class="hud-value" id="hud-alive">0</span>
        <span class="hud-label" style="margin-left:8px">Time</span>
        <span class="hud-value" id="hud-time">0.0s</span>
      </div>
    </div>

    <div id="speed-bar">
      <button class="speed-btn active" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="2">2×</button>
      <button class="speed-btn" data-speed="4">4×</button>
      <button class="speed-btn" data-speed="8">8×</button>
    </div>

    <div id="controls-bar">
      <button class="ctrl-btn" id="btn-pause">⏸ Pause</button>
      <button class="ctrl-btn danger" id="btn-reset">↺ Reset</button>
      <button class="ctrl-btn" id="btn-display">👁 All</button>
    </div>

    <div id="graph-container">
      <div id="graph-label">Fitness / Generation</div>
      <canvas id="fitness-graph"></canvas>
    </div>
  </div>

  <div id="pipeline-panel">
    <div id="pipeline-header">
      <h2>EvoLab</h2>
    </div>
    <div id="creature-config">
      <label>Creature Design</label>
      <div class="config-row" style="align-items:start;gap:8px">
        <select class="config-select" id="body-type" style="flex:1">
          <option value="roller">Roller</option>
          <option value="hopper">Hopper</option>
          <option value="snake">Snake</option>
          <option value="bipod">Bipod</option>
          <option value="triball">Triball</option>
        </select>
        <canvas id="body-preview" width="80" height="56"></canvas>
      </div>
      <div id="body-desc" class="body-desc-text"></div>
      <div class="config-row">
        <span class="config-label">Track</span>
        <select class="config-select" id="track-length">
          <option value="1500">Short</option>
          <option value="3000" selected>Medium</option>
          <option value="6000">Long</option>
        </select>
      </div>
      <div class="config-row">
        <span class="config-label">Population</span>
        <input class="config-input" type="number" id="pop-size" value="30" min="4" max="200" step="2">
      </div>
    </div>
    <div id="pipeline-label"><label>Evolution Pipeline</label></div>
    <div id="pipeline-nodes"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script src="game.js"></script>
</body>
</html>
